version: "3.9"

networks:
  app-network:
    driver: bridge

services:
  frontend:
    # image: bluevision_prod_frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    # network_mode: "host"
    depends_on:
      - backend
    # restart: always
    networks:
      - app-network
    ports:
      - "0.0.0.0:5174:80"  # Bind to all interfaces, accessible from both domains

  backend:
    # image: bluevision_prod_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    # network_mode: "host"
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/btird
      - TZ=Asia/Taipei
    depends_on:
      - db
    # restart: always
    volumes:
      - avatar_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
    ports:
      - "0.0.0.0:8001:8000"  # Bind to all interfaces, accessible from both domains

  db:
    image: postgres:15
    # restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: btird
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "btird"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Database backup service - runs daily automated backups
  db-backup:
    image: postgres:15
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db_backups:/backups
    environment:
      - PGPASSWORD=password
      - TZ=Asia/Taipei
    networks:
      - app-network
    command: |
      sh -c '
      echo "Database backup service started at $$(date)"
      while true; do
        echo "Starting backup at $$(date)"
        pg_dump -h db -U admin -d btird > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql
        if [ $$? -eq 0 ]; then
          echo "Backup completed successfully at $$(date)"
        else
          echo "Backup failed at $$(date)"
        fi
        echo "Cleaning up old backups (older than 7 days)"
        find /backups -name "backup_*.sql" -mtime +7 -delete
        echo "Next backup scheduled in 24 hours"
        sleep 86400
      done'
    restart: unless-stopped

  # Avatar backup service - runs weekly automated backups
  avatar-backup:
    image: postgres:15
    depends_on:
      - backend
    volumes:
      - ./avatar_backups:/backups
      - avatar_uploads:/source:ro
    environment:
      - TZ=Asia/Taipei
    command: |
      sh -c '
      echo "Avatar backup service started at $$(date)"
      while true; do
        echo "Starting avatar backup at $$(date)"
        BACKUP_FILE="/backups/avatars_$$(date +%Y%m%d_%H%M%S).tar.gz"
        if [ -d /source/avatars ] && [ "$$(ls -A /source/avatars 2>/dev/null)" ]; then
          tar -czf "$$BACKUP_FILE" -C /source avatars
          if [ $$? -eq 0 ]; then
            echo "Avatar backup completed successfully at $$(date)"
            echo "Backup size: $$(du -h $$BACKUP_FILE | cut -f1)"
          else
            echo "Avatar backup failed at $$(date)"
          fi
        else
          echo "No avatar files to backup at $$(date)"
        fi
        echo "Cleaning up old avatar backups (older than 30 days)"
        find /backups -name "avatars_*.tar.gz" -mtime +30 -delete
        echo "Next avatar backup scheduled in 7 days"
        sleep 604800
      done'
    restart: unless-stopped

volumes:
  pgdata_prod:
  avatar_uploads:
