version: "3.9"

networks:
  app-network:
    driver: bridge

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    # network_mode: "host"
    depends_on:
      - backend
    # restart: always
    networks:
      - app-network
    ports:
      - "5174:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    # network_mode: "host"
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/btird
      - TZ=Asia/Taipei
    depends_on:
      - db
    # restart: always
    volumes:
      - avatar_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
    ports:
      - "8001:8000"

  db:
    image: postgres:15
    # restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: btird
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "btird"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pgdata_prod:
  avatar_uploads:
