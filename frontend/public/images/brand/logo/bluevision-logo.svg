<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主漸層 - 深藍到青藍 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a46ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0093f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 背景漸層 -->
    <radialGradient id="bgGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000510;stop-opacity:1"/>
    </radialGradient>
    
    <!-- 光暈漸層 -->
    <radialGradient id="auraGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#0093f0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a46ff;stop-opacity:0"/>
    </radialGradient>
    
    <!-- WiFi漸層 -->
    <linearGradient id="wifiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#35f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 藍牙符號漸層 -->
    <linearGradient id="bluetoothGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#35f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0093f0;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 發光濾鏡 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 陰影 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- 光暈背景 -->
  <circle cx="200" cy="180" r="140" fill="url(#auraGradient)"/>
  
  <!-- 主體設計：六邊形視窗結構 -->
  <g filter="url(#shadow)">
    <!-- 外六邊形框架 -->
    <path d="M 200 90 L 256 120 L 256 180 L 200 210 L 144 180 L 144 120 Z" 
          fill="none" 
          stroke="url(#mainGradient)" 
          stroke-width="3"
          filter="url(#glow)"
          opacity="0.9"/>
    
    <!-- 內六邊形 -->
    <path d="M 200 105 L 244 130 L 244 170 L 200 195 L 156 170 L 156 130 Z" 
          fill="none" 
          stroke="#00d4ff" 
          stroke-width="2"
          opacity="0.6"/>
    
    <!-- 六邊形分割線 -->
    <g opacity="0.4" stroke="#00d4ff" stroke-width="1">
      <line x1="200" y1="90" x2="200" y2="210"/>
      <line x1="144" y1="120" x2="256" y2="180"/>
      <line x1="144" y1="180" x2="256" y2="120"/>
    </g>
    
    <!-- 數據節點 -->
    <g filter="url(#glow)">
      <circle cx="200" cy="90" r="4" fill="#00d4ff"/>
      <circle cx="256" cy="120" r="4" fill="#0093f0"/>
      <circle cx="256" cy="180" r="4" fill="#0093f0"/>
      <circle cx="200" cy="210" r="4" fill="#00d4ff"/>
      <circle cx="144" cy="180" r="4" fill="#0093f0"/>
      <circle cx="144" cy="120" r="4" fill="#0093f0"/>
    </g>
  </g>
  
  <!-- 中央輪流出現設計 -->
  <g transform="translate(200, 150)" filter="url(#strongGlow)">
    <!-- WiFi符號 - 輪流出現 -->
    <g opacity="0" transform="translate(0, -5) scale(1.5)">
      <!-- WiFi同心扇形波 - 從中心點向上發射 -->
      <g fill="none" stroke="url(#wifiGrad)" stroke-linecap="round">
        <!-- 最外層扇形弧 -->
        <path d="M -14 0 A 20 20 0 0 1 14 0" stroke-width="2.8" opacity="0.75">
          <animate attributeName="opacity" values="0.75;1;0.75" dur="2.5s" repeatCount="indefinite"/>
        </path>
        
        <!-- 中層扇形弧 -->
        <path d="M -9 5 A 13 13 0 0 1 9 5" stroke-width="2.6" opacity="0.85">
          <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
        </path>
        
        <!-- 內層扇形弧 -->
        <path d="M -4 10 A 6 6 0 0 1 4 10" stroke-width="2.4" opacity="0.95">
          <animate attributeName="opacity" values="0.95;1;0.95" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
        </path>
      </g>
      
      <!-- WiFi中心圓點 -->
      <circle cx="0" cy="15" r="2.5" fill="url(#wifiGrad)">
        <animate attributeName="r" values="2.5;3.5;2.5" dur="2s" repeatCount="indefinite"/>
      </circle>
      
      <!-- WiFi輪流顯示動畫 -->
      <animate attributeName="opacity" values="0;0;0;1;1;1;0;0;0" dur="6s" repeatCount="indefinite"/>
    </g>
    
    <!-- 藍牙符號 - 輪流出現（與WiFi相反） -->
    <g opacity="1" transform="scale(0.85)">
      <g fill="url(#bluetoothGradient)">
        <!-- 中央豎線 -->
        <rect x="-2" y="-32" width="4" height="64" rx="2"/>
        
        <!-- 上半部三角 -->
        <path d="M 2 -32 L 24 -12 L 2 0 Z" opacity="0.95"/>
        
        <!-- 下半部三角 -->
        <path d="M 2 32 L 24 12 L 2 0 Z" opacity="0.95"/>
        
        <!-- 左側連接線 -->
        <path d="M -2 0 L -18 -14 M -2 0 L -18 14" 
              stroke="url(#bluetoothGradient)" 
              stroke-width="3" 
              stroke-linecap="round"
              fill="none"/>
      </g>
      
      <!-- 中心光點 -->
      <circle cx="0" cy="0" r="6" fill="#35f0ff" opacity="0.6">
        <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      
      <!-- 藍牙輪流顯示動畫（與WiFi相反） -->
      <animate attributeName="opacity" values="1;1;1;0;0;0;1;1;1" dur="6s" repeatCount="indefinite"/>
    </g>
    
    <!-- 中央融合光點 - 始終存在 -->
    <circle cx="0" cy="0" r="6" fill="#35f0ff" opacity="0.65">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.65;0.35;0.65" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 融合能量環 - 持續脈動 -->
    <g opacity="0.45">
      <circle cx="0" cy="0" r="20" fill="none" stroke="url(#wifiGrad)" stroke-width="1.3">
        <animate attributeName="r" values="16;28;16" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0;0.6" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="20" fill="none" stroke="url(#bluetoothGradient)" stroke-width="1.3">
        <animate attributeName="r" values="16;28;16" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0;0.6" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- 環繞軌道線 -->
  <g opacity="0.3" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,4">
    <circle cx="200" cy="150" r="70">
      <animateTransform 
        attributeName="transform"
        type="rotate"
        from="0 200 150"
        to="360 200 150"
        dur="20s"
        repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="150" r="85">
      <animateTransform 
        attributeName="transform"
        type="rotate"
        from="360 200 150"
        to="0 200 150"
        dur="25s"
        repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 數據流動效果點 -->
  <g filter="url(#glow)">
    <circle cx="200" cy="90" r="3" fill="#35f0ff">
      <animate attributeName="cy" values="90;120;90" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="256" cy="120" r="3" fill="#0093f0">
      <animate attributeName="cx" values="256;230;256" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="256" cy="180" r="3" fill="#0093f0">
      <animate attributeName="cy" values="180;150;180" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 裝飾性弧線 -->
  <g opacity="0.25" fill="none" stroke="url(#mainGradient)" stroke-width="2" stroke-linecap="round">
    <path d="M 120 100 Q 130 90 150 90"/>
    <path d="M 280 100 Q 270 90 250 90"/>
    <path d="M 120 200 Q 130 210 150 210"/>
    <path d="M 280 200 Q 270 210 250 210"/>
  </g>
  
  <!-- 文字：BlueVision -->
  <g font-family="'Segoe UI', 'Arial', sans-serif" font-weight="700">
    <text x="200" y="290" 
          font-size="48" 
          fill="url(#mainGradient)" 
          text-anchor="middle"
          letter-spacing="3"
          filter="url(#glow)">BlueVision</text>
    
    <!-- WIRELESS DASHBOARD 副標題 -->
    <text x="200" y="315" 
          font-size="13" 
          fill="#0093f0" 
          text-anchor="middle"
          letter-spacing="6"
          opacity="0.8"
          font-weight="400">WIRELESS DASHBOARD</text>
  </g>
  
  <!-- 底部裝飾 -->
  <g opacity="0.5">
    <line x1="120" y1="335" x2="280" y2="335" stroke="url(#mainGradient)" stroke-width="1"/>
    <circle cx="200" cy="335" r="3" fill="#00d4ff" filter="url(#glow)"/>
  </g>
  
  <!-- 角落科技點綴 -->
  <g opacity="0.3" fill="#00d4ff">
    <rect x="30" y="30" width="2" height="12" rx="1"/>
    <rect x="30" y="30" width="12" height="2" rx="1"/>
    
    <rect x="368" y="30" width="2" height="12" rx="1"/>
    <rect x="356" y="30" width="12" height="2" rx="1"/>
    
    <rect x="30" y="360" width="2" height="12" rx="1"/>
    <rect x="30" y="370" width="12" height="2" rx="1"/>
    
    <rect x="368" y="360" width="2" height="12" rx="1"/>
    <rect x="356" y="370" width="12" height="2" rx="1"/>
  </g>
</svg>