<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主漸層 - 深藍到青藍 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a46ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0093f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 背景漸層 -->
    <radialGradient id="bgGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000510;stop-opacity:1"/>
    </radialGradient>
    
    <!-- 光暈漸層 -->
    <radialGradient id="auraGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#0093f0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a46ff;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 藍牙符號漸層 -->
    <linearGradient id="bluetoothGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#35f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0093f0;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 發光濾鏡 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 陰影 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- 光暈背景 -->
  <circle cx="300" cy="150" r="180" fill="url(#auraGradient)"/>
  
  <!-- 主體設計：六邊形視窗結構 -->
  <g filter="url(#shadow)">
    <!-- 外六邊形框架 -->
    <path d="M 300 60 L 376 105 L 376 195 L 300 240 L 224 195 L 224 105 Z" 
          fill="none" 
          stroke="url(#mainGradient)" 
          stroke-width="3"
          filter="url(#glow)"
          opacity="0.9"/>
    
    <!-- 內六邊形 -->
    <path d="M 300 80 L 356 115 L 356 185 L 300 220 L 244 185 L 244 115 Z" 
          fill="none" 
          stroke="#00d4ff" 
          stroke-width="2"
          opacity="0.6"/>
    
    <!-- 六邊形分割線 - 創造儀表板格線感 -->
    <g opacity="0.4" stroke="#00d4ff" stroke-width="1">
      <line x1="300" y1="60" x2="300" y2="240"/>
      <line x1="224" y1="105" x2="376" y2="195"/>
      <line x1="224" y1="195" x2="376" y2="105"/>
    </g>
    
    <!-- 數據節點 -->
    <g filter="url(#glow)">
      <circle cx="300" cy="60" r="5" fill="#00d4ff"/>
      <circle cx="376" cy="105" r="5" fill="#0093f0"/>
      <circle cx="376" cy="195" r="5" fill="#0093f0"/>
      <circle cx="300" cy="240" r="5" fill="#00d4ff"/>
      <circle cx="224" cy="195" r="5" fill="#0093f0"/>
      <circle cx="224" cy="105" r="5" fill="#0093f0"/>
    </g>
  </g>
  
  <!-- 中心藍牙符號 - 重新設計為幾何圖形 -->
  <g transform="translate(300, 150)" filter="url(#strongGlow)">
    <!-- 藍牙符號主體 -->
    <g fill="url(#bluetoothGradient)">
      <!-- 中央豎線 -->
      <rect x="-2" y="-32" width="4" height="64" rx="2"/>
      
      <!-- 上半部三角 -->
      <path d="M 2 -32 L 24 -12 L 2 0 Z" opacity="0.95"/>
      
      <!-- 下半部三角 -->
      <path d="M 2 32 L 24 12 L 2 0 Z" opacity="0.95"/>
      
      <!-- 左側連接線 -->
      <path d="M -2 0 L -18 -14 M -2 0 L -18 14" 
            stroke="url(#bluetoothGradient)" 
            stroke-width="3" 
            stroke-linecap="round"
            fill="none"/>
    </g>
    
    <!-- 中心光點 -->
    <circle cx="0" cy="0" r="6" fill="#35f0ff" opacity="0.6">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 環繞軌道線 -->
  <g opacity="0.3" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,4">
    <circle cx="300" cy="150" r="100">
      <animateTransform 
        attributeName="transform"
        type="rotate"
        from="0 300 150"
        to="360 300 150"
        dur="20s"
        repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="150" r="120">
      <animateTransform 
        attributeName="transform"
        type="rotate"
        from="360 300 150"
        to="0 300 150"
        dur="25s"
        repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 數據流動效果點 -->
  <g filter="url(#glow)">
    <!-- 上方流動點 -->
    <circle cx="300" cy="60" r="4" fill="#35f0ff">
      <animate attributeName="cy" values="60;105;60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 右上流動點 -->
    <circle cx="376" cy="105" r="4" fill="#0093f0">
      <animate attributeName="cx" values="376;338;376" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 右下流動點 -->
    <circle cx="376" cy="195" r="4" fill="#0093f0">
      <animate attributeName="cy" values="195;150;195" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 裝飾性弧線 - 形成雷達掃描感 -->
  <g opacity="0.25" fill="none" stroke="url(#mainGradient)" stroke-width="2" stroke-linecap="round">
    <path d="M 200 65 Q 220 50 250 50"/>
    <path d="M 400 65 Q 380 50 350 50"/>
    <path d="M 200 235 Q 220 250 250 250"/>
    <path d="M 400 235 Q 380 250 350 250"/>
  </g>
  
  <!-- 文字：BlueSight -->
  <g font-family="'Segoe UI', 'Arial', sans-serif" font-weight="700">
    <text x="300" y="310" 
          font-size="48" 
          fill="url(#mainGradient)" 
          text-anchor="middle"
          letter-spacing="3"
          filter="url(#glow)">BlueSight</text>
    
    <!-- DASHBOARD 副標題 -->
    <text x="300" y="340" 
          font-size="13" 
          fill="#0093f0" 
          text-anchor="middle"
          letter-spacing="6"
          opacity="0.8"
          font-weight="400">DASHBOARD</text>
  </g>
  
  <!-- 底部裝飾 -->
  <g opacity="0.5">
    <line x1="180" y1="360" x2="420" y2="360" stroke="url(#mainGradient)" stroke-width="1"/>
    <circle cx="300" cy="360" r="3" fill="#00d4ff" filter="url(#glow)"/>
  </g>
  
  <!-- 角落科技點綴 -->
  <g opacity="0.3" fill="#00d4ff">
    <rect x="30" y="30" width="2" height="12" rx="1"/>
    <rect x="30" y="30" width="12" height="2" rx="1"/>
    
    <rect x="568" y="30" width="2" height="12" rx="1"/>
    <rect x="558" y="30" width="12" height="2" rx="1"/>
    
    <rect x="30" y="358" width="2" height="12" rx="1"/>
    <rect x="30" y="368" width="12" height="2" rx="1"/>
    
    <rect x="568" y="358" width="2" height="12" rx="1"/>
    <rect x="558" y="368" width="12" height="2" rx="1"/>
  </g>
</svg>