<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主漸層 - 深藍到青藍 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a46ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0093f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 背景漸層 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000510;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0d1b2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000510;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 光暈漸層 -->
    <radialGradient id="auraGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#0093f0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a46ff;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 視覺漸層 -->
    <linearGradient id="visionGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#35f0ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0093f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a46ff;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 發光濾鏡 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 陰影 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="700" height="300" fill="url(#bgGradient)"/>
  
  <!-- 左側圖標區域 -->
  <g transform="translate(167, 150)">
    <!-- 光暈背景 -->
    <circle cx="0" cy="0" r="135" fill="url(#auraGradient)"/>
    
    <!-- 主體設計：六邊形視窗結構 -->
    <g filter="url(#shadow)">
      <!-- 外六邊形框架 -->
      <path d="M 0 -77 L 65.2 -38.75 L 65.2 38.75 L 0 77 L -65.2 38.75 L -65.2 -38.75 Z" 
            fill="none" 
            stroke="url(#mainGradient)" 
            stroke-width="3"
            filter="url(#glow)"
            opacity="0.9"/>
      
      <!-- 內六邊形 -->
      <path d="M 0 -60 L 48.8 -30 L 48.8 30 L 0 60 L -48.8 30 L -48.8 -30 Z" 
            fill="none" 
            stroke="#00d4ff" 
            stroke-width="2"
            opacity="0.6"/>
      
      <!-- 六邊形分割線 -->
      <g opacity="0.4" stroke="#00d4ff" stroke-width="1">
        <line x1="0" y1="-77" x2="0" y2="77"/>
        <line x1="-65.2" y1="-38.75" x2="65.2" y2="38.75"/>
        <line x1="-65.2" y1="38.75" x2="65.2" y2="-38.75"/>
      </g>
      
      <!-- 數據節點 -->
      <g filter="url(#glow)">
        <circle cx="0" cy="-77" r="5" fill="#00d4ff"/>
        <circle cx="65.2" cy="-38.75" r="5" fill="#0093f0"/>
        <circle cx="65.2" cy="38.75" r="5" fill="#0093f0"/>
        <circle cx="0" cy="77" r="5" fill="#00d4ff"/>
        <circle cx="-65.2" cy="38.75" r="5" fill="#0093f0"/>
        <circle cx="-65.2" cy="-38.75" r="5" fill="#0093f0"/>
      </g>
    </g>
    
    <!-- 創意設計：Vision Eye - WiFi波形成眼睛輪廓，Bluetooth在瞳孔中心 -->
    <g filter="url(#strongGlow)">
      <!-- 眼睛外輪廓 - 由WiFi信號波組成 -->
      <g fill="none" stroke="url(#visionGradient)" stroke-linecap="round">
        <!-- 上眼瞼 - WiFi波浪形 -->
        <path d="M -45 0 Q -35 -25, -20 -30 Q -5 -32, 0 -32 Q 5 -32, 20 -30 Q 35 -25, 45 0" 
              stroke-width="3.5" 
              opacity="0.95">
          <animate attributeName="d" 
                   values="M -45 0 Q -35 -25, -20 -30 Q -5 -32, 0 -32 Q 5 -32, 20 -30 Q 35 -25, 45 0;
                           M -45 0 Q -35 -28, -20 -33 Q -5 -35, 0 -35 Q 5 -35, 20 -33 Q 35 -28, 45 0;
                           M -45 0 Q -35 -25, -20 -30 Q -5 -32, 0 -32 Q 5 -32, 20 -30 Q 35 -25, 45 0" 
                   dur="3s" 
                   repeatCount="indefinite"/>
        </path>
        
        <!-- 下眼瞼 - WiFi波浪形 -->
        <path d="M -45 0 Q -35 20, -20 24 Q -5 26, 0 26 Q 5 26, 20 24 Q 35 20, 45 0" 
              stroke-width="3.5" 
              opacity="0.95">
          <animate attributeName="d" 
                   values="M -45 0 Q -35 20, -20 24 Q -5 26, 0 26 Q 5 26, 20 24 Q 35 20, 45 0;
                           M -45 0 Q -35 22, -20 26 Q -5 28, 0 28 Q 5 28, 20 26 Q 35 22, 45 0;
                           M -45 0 Q -35 20, -20 24 Q -5 26, 0 26 Q 5 26, 20 24 Q 35 20, 45 0" 
                   dur="3s" 
                   repeatCount="indefinite"/>
        </path>
        
        <!-- 外層WiFi信號環 -->
        <path d="M -55 0 Q -45 -30, -25 -37 Q -10 -40, 0 -40 Q 10 -40, 25 -37 Q 45 -30, 55 0" 
              stroke-width="2.5" 
              opacity="0.6">
          <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
        </path>
        <path d="M -55 0 Q -45 25, -25 32 Q -10 35, 0 35 Q 10 35, 25 32 Q 45 25, 55 0" 
              stroke-width="2.5" 
              opacity="0.6">
          <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
        </path>
        
        <!-- 最外層WiFi擴散 -->
        <path d="M -65 0 Q -55 -35, -30 -43 Q -12 -47, 0 -47 Q 12 -47, 30 -43 Q 55 -35, 65 0" 
              stroke-width="2" 
              opacity="0.4">
          <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
        </path>
        <path d="M -65 0 Q -55 30, -30 38 Q -12 42, 0 42 Q 12 42, 30 38 Q 55 30, 65 0" 
              stroke-width="2" 
              opacity="0.4">
          <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
        </path>
      </g>
      
      <!-- 虹膜 - 由同心圓WiFi波組成 -->
      <g fill="none" stroke="url(#visionGradient)" opacity="0.7">
        <circle cx="0" cy="-3" r="18" stroke-width="2">
          <animate attributeName="r" values="18;19;18" dur="2.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="-3" r="14" stroke-width="1.5">
          <animate attributeName="r" values="14;15;14" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="-3" r="10" stroke-width="1.5">
          <animate attributeName="r" values="10;11;10" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <!-- 瞳孔中心 - Bluetooth符號 -->
      <g transform="translate(0, -3)">
        <g fill="url(#visionGradient)">
          <!-- Bluetooth豎線 -->
          <rect x="-1.2" y="-16" width="2.4" height="32" rx="1.2">
            <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
          </rect>
          
          <!-- 上三角 -->
          <path d="M 1.2 -16 L 12 -6 L 1.2 0 Z" opacity="0.95"/>
          
          <!-- 下三角 -->
          <path d="M 1.2 16 L 12 6 L 1.2 0 Z" opacity="0.95"/>
          
          <!-- 左側連接線 -->
          <path d="M -1.2 0 L -9 -7 M -1.2 0 L -9 7" 
                stroke="url(#visionGradient)" 
                stroke-width="1.8" 
                stroke-linecap="round"
                fill="none"/>
        </g>
        
        <!-- 瞳孔中心發光點 -->
        <circle cx="0" cy="0" r="3" fill="#35f0ff" opacity="0.8">
          <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;0.5;0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <!-- 眼角發射的數據流 -->
      <g opacity="0.6">
        <!-- 左眼角WiFi射線 -->
        <line x1="-45" y1="0" x2="-60" y2="-8" stroke="#35f0ff" stroke-width="1.5" stroke-linecap="round">
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
        </line>
        <line x1="-45" y1="0" x2="-60" y2="0" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round">
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" begin="0.3s" repeatCount="indefinite"/>
        </line>
        <line x1="-45" y1="0" x2="-60" y2="8" stroke="#0093f0" stroke-width="1.5" stroke-linecap="round">
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" begin="0.6s" repeatCount="indefinite"/>
        </line>
        
        <!-- 右眼角WiFi射線 -->
        <line x1="45" y1="0" x2="60" y2="-8" stroke="#35f0ff" stroke-width="1.5" stroke-linecap="round">
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" begin="0.2s" repeatCount="indefinite"/>
        </line>
        <line x1="45" y1="0" x2="60" y2="0" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round">
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" begin="0.5s" repeatCount="indefinite"/>
        </line>
        <line x1="45" y1="0" x2="60" y2="8" stroke="#0093f0" stroke-width="1.5" stroke-linecap="round">
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" begin="0.8s" repeatCount="indefinite"/>
        </line>
      </g>
      
      <!-- 視線掃描效果 -->
      <g opacity="0.5">
        <line x1="-20" y1="-3" x2="80" y2="-3" stroke="#35f0ff" stroke-width="2" stroke-linecap="round">
          <animate attributeName="x2" values="80;120;80" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
        </line>
        <circle cx="80" cy="-3" r="3" fill="#35f0ff">
          <animate attributeName="cx" values="80;120;80" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    
    <!-- 環繞軌道線 -->
    <g opacity="0.3" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,4">
      <circle cx="0" cy="0" r="85">
        <animateTransform 
          attributeName="transform"
          type="rotate"
          from="0 0 0"
          to="360 0 0"
          dur="20s"
          repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="102">
        <animateTransform 
          attributeName="transform"
          type="rotate"
          from="360 0 0"
          to="0 0 0"
          dur="25s"
          repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Vision掃描數據流 -->
    <g filter="url(#glow)">
      <circle cx="0" cy="-77" r="4" fill="#35f0ff">
        <animate attributeName="cy" values="-77;-38.75;-77" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </circle>
      
      <circle cx="65.2" cy="-38.75" r="4" fill="#0093f0">
        <animate attributeName="cx" values="65.2;32.6;65.2" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="-38.75;-10;-38.75" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      
      <circle cx="65.2" cy="38.75" r="4" fill="#00d4ff">
        <animate attributeName="cy" values="38.75;0;38.75" dur="4s" begin="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
      </circle>
      
      <circle cx="-65.2" cy="38.75" r="4" fill="#35f0ff">
        <animate attributeName="cx" values="-65.2;-32.6;-65.2" dur="3.8s" begin="0.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="3.8s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      
      <circle cx="0" cy="77" r="4" fill="#0093f0">
        <animate attributeName="cy" values="77;38.75;77" dur="3.3s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="3.3s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- 裝飾性弧線 -->
    <g opacity="0.25" fill="none" stroke="url(#mainGradient)" stroke-width="2" stroke-linecap="round">
      <path d="M -48.8 -68 Q -24.4 -77 0 -77"/>
      <path d="M 48.8 -68 Q 24.4 -77 0 -77"/>
      <path d="M -48.8 68 Q -24.4 77 0 77"/>
      <path d="M 48.8 68 Q 24.4 77 0 77"/>
    </g>
  </g>
  
  <!-- 分隔線 -->
  <line x1="233" y1="80" x2="233" y2="220" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- 右側文字區域 -->
  <g transform="translate(300, 0)">
    <!-- 主標題 BlueVision -->
    <text x="0" y="155" 
          font-family="'Segoe UI', 'Arial', sans-serif"
          font-size="62" 
          font-weight="700"
          fill="url(#mainGradient)" 
          letter-spacing="2"
          filter="url(#glow)">BlueVision</text>
    
    <!-- 副標題 WIRELESS INSIGHT -->
    <text x="0" y="192" 
          font-family="'Segoe UI', 'Arial', sans-serif"
          font-size="14" 
          font-weight="300"
          fill="#0093f0" 
          letter-spacing="4"
          opacity="0.8">WIRELESS INSIGHT</text>
    
    <!-- 裝飾線 -->
    <line x1="0" y1="215" x2="220" y2="215" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.4"/>
    <circle cx="110" cy="215" r="3" fill="#00d4ff" filter="url(#glow)" opacity="0.7"/>
  </g>
  
  <!-- 裝飾性背景元素 - 眼睛圖示 -->
  <g opacity="0.15">
    <!-- 左上角 - 簡化眼睛 -->
    <ellipse cx="45" cy="50" rx="12" ry="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="45" cy="50" r="3" fill="#00d4ff"/>
    
    <!-- 左下角 -->
    <ellipse cx="45" cy="250" rx="12" ry="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="45" cy="250" r="3" fill="#00d4ff"/>
    
    <!-- 右上角 -->
    <ellipse cx="655" cy="50" rx="12" ry="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="655" cy="50" r="3" fill="#00d4ff"/>
    
    <!-- 右下角 -->
    <ellipse cx="655" cy="250" rx="12" ry="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="655" cy="250" r="3" fill="#00d4ff"/>
  </g>
  
  <!-- 角落科技框 -->
  <g opacity="0.3" fill="#00d4ff">
    <rect x="15" y="20" width="2" height="12" rx="1"/>
    <rect x="15" y="20" width="12" height="2" rx="1"/>
    
    <rect x="683" y="20" width="2" height="12" rx="1"/>
    <rect x="671" y="20" width="12" height="2" rx="1"/>
    
    <rect x="15" y="270" width="2" height="12" rx="1"/>
    <rect x="15" y="280" width="12" height="2" rx="1"/>
    
    <rect x="683" y="270" width="2" height="12" rx="1"/>
    <rect x="671" y="280" width="12" height="2" rx="1"/>
  </g>
  
  <!-- 背景數據流線條 -->
  <g opacity="0.12" stroke="#00d4ff" stroke-width="1" fill="none">
    <path d="M 480 100 Q 520 110 560 100">
      <animate attributeName="d" 
               values="M 480 100 Q 520 110 560 100; M 480 100 Q 520 90 560 100; M 480 100 Q 520 110 560 100" 
               dur="5s" 
               repeatCount="indefinite"/>
    </path>
    <path d="M 480 200 Q 520 190 560 200">
      <animate attributeName="d" 
               values="M 480 200 Q 520 190 560 200; M 480 200 Q 520 210 560 200; M 480 200 Q 520 190 560 200" 
               dur="6s" 
               repeatCount="indefinite"/>
    </path>
    <path d="M 500 150 Q 530 145 560 150">
      <animate attributeName="d" 
               values="M 500 150 Q 530 145 560 150; M 500 150 Q 530 155 560 150; M 500 150 Q 530 145 560 150" 
               dur="4.5s" 
               repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- 動態光點 -->
  <g filter="url(#glow)">
    <circle cx="570" cy="80" r="2" fill="#00d4ff" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="220" r="2" fill="#0093f0" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="150" r="2" fill="#35f0ff" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
