name: Deploy (Windows Podman)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - dev
      run_backup:
        description: "Run DB backup before deploy"
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-branch:
    name: Ensure deploy runs on main branch only
    runs-on: ubuntu-latest
    steps:
      - name: Block non-main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "❌ Deploy is only allowed from the main branch."
          echo "Current branch: ${{ github.ref }}"
          exit 1

  deploy:
    name: Deploy on self-hosted Windows runner
    needs: check-branch
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show tool versions
        shell: powershell
        run: |
          podman --version
          & "C:\Program Files\Python311\python.exe" -m podman_compose --version

      - name: Backup database (optional)
        if: ${{ inputs.run_backup }}
        shell: powershell
        run: |
          .\scripts\backup_db.bat

      - name: Deploy prod stack
        if: ${{ inputs.target == 'prod' }}
        shell: powershell
        run: |
          & "C:\Program Files\Python311\python.exe" -m podman_compose -p bluevision_prod -f .\podman-compose.prod.yml up -d --build --force-recreate

      - name: Deploy dev stack
        if: ${{ inputs.target == 'dev' }}
        shell: powershell
        run: |
          & "C:\Program Files\Python311\python.exe" -m podman_compose -p bluevision_dev -f .\podman-compose.dev.yml up -d --build --force-recreate

      - name: Post-deploy health check (prod)
        if: ${{ inputs.target == 'prod' }}
        shell: powershell
        run: |
          $backend = Invoke-WebRequest -Uri "http://127.0.0.1:8001/health" -UseBasicParsing -TimeoutSec 20
          if ($backend.StatusCode -ne 200) { throw "Backend health check failed" }

      - name: Print running containers
        shell: powershell
        run: |
          podman ps
