name: Deploy (Windows Podman)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - dev
      run_backup:
        description: "Run DB backup before deploy"
        required: true
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-branch:
    name: Ensure deploy runs on main branch only
    runs-on: ubuntu-latest
    steps:
      - name: Block non-main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "❌ Deploy is only allowed from the main branch."
          echo "Current branch: ${{ github.ref }}"
          exit 1

  deploy:
    name: Deploy on self-hosted Windows runner
    needs: check-branch
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show tool versions
        shell: powershell
        run: |
          podman --version
          & "C:\Program Files\Python311\python.exe" -m podman_compose --version

      - name: Debug environment
        shell: powershell
        run: |
          whoami
          echo "USERPROFILE: $env:USERPROFILE"
          echo "--- Working directory ---"
          Get-Location
          echo "--- Repo files ---"
          Get-ChildItem -Recurse -Depth 1 | Select-Object FullName
          echo "--- All containers ---"
          podman ps -a
          echo "--- Podman info ---"
          podman info --format "{{.Store.GraphRoot}}"
          echo "--- Filter test ---"
          podman ps --filter name=bluevision_prod_db_1 -q

      - name: Backup database (optional)
        if: ${{ inputs.run_backup }}
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          .\scripts\backup_db.bat

      - name: Deploy prod stack
        if: ${{ inputs.target == 'prod' }}
        shell: powershell
        run: |
          $wslPath = $env:GITHUB_WORKSPACE.Replace('\', '/') -replace '^([A-Za-z]):', '/mnt/$1'
          $wslPath = $wslPath.ToLower()
          echo "WSL path: $wslPath"
          wsl -d podman-BTIRD_PM -u root bash -c "export PATH=/usr/local/bin:/usr/bin:$PATH && export NETAVARK_FW=none && export http_proxy=http://proxy-dmz.intel.com:912 && export https_proxy=http://proxy-dmz.intel.com:912 && export HTTP_PROXY=http://proxy-dmz.intel.com:912 && export HTTPS_PROXY=http://proxy-dmz.intel.com:912 && cd '$wslPath' && podman-compose -p bluevision_prod -f podman-compose.prod.yml up -d --build --force-recreate"

      - name: Deploy dev stack
        if: ${{ inputs.target == 'dev' }}
        shell: powershell
        run: |
          $wslPath = $env:GITHUB_WORKSPACE.Replace('\', '/') -replace '^([A-Za-z]):', '/mnt/$1'
          $wslPath = $wslPath.ToLower()
          wsl -d podman-BTIRD_PM -u root bash -c "export PATH=/usr/local/bin:/usr/bin:$PATH && export NETAVARK_FW=none && export http_proxy=http://proxy-dmz.intel.com:912 && export https_proxy=http://proxy-dmz.intel.com:912 && export HTTP_PROXY=http://proxy-dmz.intel.com:912 && export HTTPS_PROXY=http://proxy-dmz.intel.com:912 && cd '$wslPath' && podman-compose -p bluevision_dev -f podman-compose.dev.yml up -d --build --force-recreate"

      - name: Post-deploy health check (prod)
        if: ${{ inputs.target == 'prod' }}
        shell: powershell
        run: |
          $backend = Invoke-WebRequest -Uri "http://127.0.0.1:8001/health" -UseBasicParsing -TimeoutSec 20
          if ($backend.StatusCode -ne 200) { throw "Backend health check failed" }

      - name: Print running containers
        shell: powershell
        run: |
          podman ps
