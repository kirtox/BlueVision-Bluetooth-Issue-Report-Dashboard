name: Deploy (Windows Podman)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - dev
      run_backup:
        description: "Run DB backup before deploy"
        required: true
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-branch:
    name: Ensure deploy runs on main branch only
    runs-on: ubuntu-latest
    steps:
      - name: Block non-main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "❌ Deploy is only allowed from the main branch."
          echo "Current branch: ${{ github.ref }}"
          exit 1

  deploy:
    name: Deploy on self-hosted Windows runner
    needs: check-branch
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show tool versions
        shell: powershell
        run: |
          podman --version
          & "C:\Program Files\Python311\python.exe" -m podman_compose --version

      - name: Debug environment
        shell: powershell
        run: |
          whoami
          echo "USERPROFILE: $env:USERPROFILE"
          echo "--- Working directory ---"
          Get-Location
          echo "--- Repo files ---"
          Get-ChildItem -Recurse -Depth 1 | Select-Object FullName
          echo "--- All containers ---"
          podman ps -a
          echo "--- Podman info ---"
          podman info --format "{{.Store.GraphRoot}}"
          echo "--- Filter test ---"
          podman ps --filter name=bluevision_prod_db_1 -q

      - name: Backup database (optional)
        if: ${{ inputs.run_backup }}
        shell: powershell
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          .\scripts\backup_db.bat

      - name: Copy large static files (not tracked by Git)
        shell: powershell
        run: |
          $dest = Join-Path $env:GITHUB_WORKSPACE "frontend\public\tool_tutorial"
          if (-not (Test-Path $dest)) { New-Item -ItemType Directory -Path $dest | Out-Null }
          $src = "C:\BlueVision_static\tool-setup.zip"
          if (Test-Path $src) {
            Copy-Item -Path $src -Destination "$dest\tool-setup.zip" -Force
            Write-Host "✅ Copied tool-setup.zip to workspace"
          } else {
            Write-Warning "⚠ $src not found - Download button will not work. Place the file at $src on the server."
          }

      - name: Deploy prod stack
        if: ${{ inputs.target == 'prod' }}
        shell: powershell
        run: |
          $wslPath = $env:GITHUB_WORKSPACE.Replace('\', '/') -replace '^([A-Za-z]):', '/mnt/$1'
          $wslPath = $wslPath.ToLower()
          $proxy = "http://proxy-dmz.intel.com:912"
          $buildEnv = "export NETAVARK_FW=none http_proxy=$proxy https_proxy=$proxy HTTP_PROXY=$proxy HTTPS_PROXY=$proxy"
          $buildArgs = "--build-arg http_proxy=$proxy --build-arg https_proxy=$proxy"
          echo "WSL path: $wslPath"
          wsl -d podman-BTIRD_PM -u root bash -c "$buildEnv && cd '$wslPath' && podman build --network=host --no-cache $buildArgs -t bluevision_prod_frontend:latest -f frontend/Dockerfile.prod frontend/"
          wsl -d podman-BTIRD_PM -u root bash -c "$buildEnv && cd '$wslPath' && podman build --network=host --no-cache $buildArgs -t bluevision_prod_backend:latest -f backend/Dockerfile.prod backend/"
          Set-Location $env:GITHUB_WORKSPACE
          Write-Host "Stopping existing containers..."
          $ErrorActionPreference = 'Continue'
          & "C:\Program Files\Python311\python.exe" -m podman_compose -p bluevision_prod -f podman-compose.prod.yml down *>&1 | Out-String | Write-Verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠ Graceful stop had issues (likely netavark cleanup), forcing removal..."
            Start-Sleep -Seconds 2
            $ids = podman ps -aq --filter "label=io.podman.compose.project=bluevision_prod"
            if ($ids) { 
              podman rm -f $ids *>&1 | Out-Null
              Write-Host "✅ Force removal completed"
            }
          } else {
            Write-Host "✅ Containers stopped gracefully"
          }
          & "C:\Program Files\Python311\python.exe" -m podman_compose -p bluevision_prod -f podman-compose.prod.yml up -d db
          $maxRetries = 24
          $retries = 0
          do {
            Start-Sleep -Seconds 5
            podman healthcheck run bluevision_prod_db_1 2>&1 | Out-Null
            $retries++
            Write-Host "DB healthcheck attempt $retries/$maxRetries (exit: $LASTEXITCODE)"
          } while ($LASTEXITCODE -ne 0 -and $retries -lt $maxRetries)
          if ($LASTEXITCODE -ne 0) { throw "DB failed to become healthy after $maxRetries attempts" }
          & "C:\Program Files\Python311\python.exe" -m podman_compose -p bluevision_prod -f podman-compose.prod.yml up -d

      - name: Deploy dev stack
        if: ${{ inputs.target == 'dev' }}
        shell: powershell
        run: |
          $wslPath = $env:GITHUB_WORKSPACE.Replace('\', '/') -replace '^([A-Za-z]):', '/mnt/$1'
          $wslPath = $wslPath.ToLower()
          $proxy = "http://proxy-dmz.intel.com:912"
          $buildEnv = "export NETAVARK_FW=none http_proxy=$proxy https_proxy=$proxy HTTP_PROXY=$proxy HTTPS_PROXY=$proxy"
          $buildArgs = "--build-arg http_proxy=$proxy --build-arg https_proxy=$proxy"
          wsl -d podman-BTIRD_PM -u root bash -c "$buildEnv && cd '$wslPath' && podman build --network=host --no-cache $buildArgs -t bluevision_dev_frontend:latest -f frontend/Dockerfile.dev frontend/"
          wsl -d podman-BTIRD_PM -u root bash -c "$buildEnv && cd '$wslPath' && podman build --network=host --no-cache $buildArgs -t bluevision_dev_backend:latest -f backend/Dockerfile.dev backend/"
          Set-Location $env:GITHUB_WORKSPACE
          Write-Host "Stopping existing containers..."
          $ErrorActionPreference = 'Continue'
          & "C:\Program Files\Python311\python.exe" -m podman_compose -p bluevision_dev -f podman-compose.dev.yml down *>&1 | Out-String | Write-Verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠ Graceful stop had issues (likely netavark cleanup), forcing removal..."
            Start-Sleep -Seconds 2
            $ids = podman ps -aq --filter "label=io.podman.compose.project=bluevision_dev"
            if ($ids) { 
              podman rm -f $ids *>&1 | Out-Null
              Write-Host "✅ Force removal completed"
            }
          } else {
            Write-Host "✅ Containers stopped gracefully"
          }
          & "C:\Program Files\Python311\python.exe" -m podman_compose -p bluevision_dev -f podman-compose.dev.yml up -d db
          $maxRetries = 24
          $retries = 0
          do {
            Start-Sleep -Seconds 5
            podman healthcheck run bluevision_dev_db_1 2>&1 | Out-Null
            $retries++
            Write-Host "DB healthcheck attempt $retries/$maxRetries (exit: $LASTEXITCODE)"
          } while ($LASTEXITCODE -ne 0 -and $retries -lt $maxRetries)
          if ($LASTEXITCODE -ne 0) { throw "DB failed to become healthy after $maxRetries attempts" }
          & "C:\Program Files\Python311\python.exe" -m podman_compose -p bluevision_dev -f podman-compose.dev.yml up -d

      - name: Post-deploy health check (prod)
        if: ${{ inputs.target == 'prod' }}
        shell: powershell
        run: |
          $backend = Invoke-WebRequest -Uri "http://127.0.0.1:8001/health" -UseBasicParsing -TimeoutSec 20
          if ($backend.StatusCode -ne 200) { throw "Backend health check failed" }

      - name: Print running containers
        shell: powershell
        run: |
          podman ps
