name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-check:
    name: Backend dependency and syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python imports and syntax
        run: python -m compileall app

  container-smoke-build:
    name: Container smoke build
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image (smoke)
        run: docker build -t bluevision-backend-smoke -f backend/Dockerfile.prod backend

      - name: Build frontend image (smoke)
        run: docker build -t bluevision-frontend-smoke -f frontend/Dockerfile.prod frontend
